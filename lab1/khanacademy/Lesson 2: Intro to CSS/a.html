<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: Colorful creature</title>

        <style>
            body {
                background-color: lightblue;
            }

            p {
                color: darkblue;
            }

            h1 {
                color: darkred;
            }
        </style>
    </head>
    <body>

        <h1>The coolest creature</h1>

        <img src="https://www.kasandbox.org/programming-images/animals/cat.png" alt="cat" width="200">

        <p>The <em>cat</em> is awesome because <strong>it is cute and playful</strong>.</p>

    </body>
</html>
