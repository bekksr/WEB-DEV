<div class="product-card">
  <img [src]="product.image" [alt]="product.name">
  <h3>{{ product.name }}</h3>
  <p>{{ product.price }} ₸</p>

  <div class="actions">
    <button (click)="like()">❤️ {{ product.likes }}</button>

    <button class="delete-btn" (click)="onRemove()">🗑️ Удалить</button>
  </div>

  <div class="share-buttons">
    <button (click)="share('wa')">WhatsApp</button>
    <button (click)="share('tg')">Telegram</button>
  </div>
</div>
