<!DOCTYPE html>
<html>
<head>
    <title>Atack Of Titan</title>
    <style>
        .first {
            width: 100px;
            background: lightblue;
            height: 50px;
        }

        .second {
            height: 200px;
            background: lightgreen;
            width: 100px;
        }

        .third {
            margin: 1em;
            border: 2px solid black;
        }

        .fourth {
            font-size: 2em;
            border: 2px solid red;
        }
    </style>
</head>

<body>

<div class="first">
    This div has a width of 100px.
</div>

<div class="second">
    This div has a height of 200px.
</div>

<div class="third">
    This div has a margin of 1em, so it has space around it.
</div>

<div class="fourth">
    This div has a font-size of 2em, so the text is much bigger.
</div>

</body>
</html>
