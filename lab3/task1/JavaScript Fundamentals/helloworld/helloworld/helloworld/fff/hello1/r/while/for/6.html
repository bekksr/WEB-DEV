
<!DOCTYPE html>

    <title> Hello Java Script </title>
</head>
<body> 
    <script> 
         while(true){
             a = prompt("Enter a number greater than 100?", "");
             if(a > 100){
                 break;
             } else if(a =="" || a==null){
                break;
             }
        }
    </script>
</body>
